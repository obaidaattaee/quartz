services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quartz-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - APP_NAME=Quartz
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=${APP_URL:-http://localhost:8080}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=quartz
      - DB_USERNAME=quartz
      - DB_PASSWORD=${DB_PASSWORD:-quartz_secret}
      - CACHE_STORE=file
      - SESSION_DRIVER=file
      - QUEUE_CONNECTION=database
      - MAIL_MAILER=${MAIL_MAILER:-log}
      - MAIL_HOST=${MAIL_HOST:-}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-tls}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-noreply@quartz.com}
      - MAIL_FROM_NAME=Quartz Solutions
      - VITE_HMR_HOST=localhost
    volumes:
      # Bind the whole project so host edits appear instantly in the container.
      - .:/var/www/html
      # Preserve image-built deps so host doesn't shadow them.
      - /var/www/html/node_modules
      - /var/www/html/vendor
      - storage:/var/www/html/storage/app/public
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: quartz-db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=quartz
      - MYSQL_USER=quartz
      - MYSQL_PASSWORD=${DB_PASSWORD:-quartz_secret}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-root_secret}
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dbdata:
  storage:
