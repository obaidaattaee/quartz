<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Decorative geometric accent for hero/feature section backgrounds -->
  <!-- Uses currentColor so it adapts to light/dark mode -->
  <circle cx="200" cy="200" r="150" stroke="currentColor" stroke-width="0.5" opacity="0.08"/>
  <circle cx="200" cy="200" r="100" stroke="currentColor" stroke-width="0.5" opacity="0.06"/>
  <circle cx="200" cy="200" r="50" stroke="currentColor" stroke-width="0.5" opacity="0.04"/>
  <!-- Diagonal lines radiating from center -->
  <line x1="200" y1="50" x2="200" y2="350" stroke="currentColor" stroke-width="0.5" opacity="0.05"/>
  <line x1="50" y1="200" x2="350" y2="200" stroke="currentColor" stroke-width="0.5" opacity="0.05"/>
  <line x1="94" y1="94" x2="306" y2="306" stroke="currentColor" stroke-width="0.5" opacity="0.04"/>
  <line x1="306" y1="94" x2="94" y2="306" stroke="currentColor" stroke-width="0.5" opacity="0.04"/>
  <!-- Small accent dots at intersections -->
  <circle cx="200" cy="50" r="2" fill="currentColor" opacity="0.1"/>
  <circle cx="200" cy="350" r="2" fill="currentColor" opacity="0.1"/>
  <circle cx="50" cy="200" r="2" fill="currentColor" opacity="0.1"/>
  <circle cx="350" cy="200" r="2" fill="currentColor" opacity="0.1"/>
</svg>
