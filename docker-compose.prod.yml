services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quartz-app
    restart: always
    ports:
      - "8080:80"
    environment:
      - APP_NAME=Quartz
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://${DOMAIN:-localhost}
      - APP_KEY=${APP_KEY:-}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=quartz
      - DB_USERNAME=quartz
      - DB_PASSWORD=${DB_PASSWORD:-quartz_secret_2026}
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MAIL_MAILER=${MAIL_MAILER:-smtp}
      - MAIL_HOST=${MAIL_HOST:-}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-tls}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-noreply@quartz.com}
      - MAIL_FROM_NAME=Quartz Solutions
    volumes:
      - storage:/var/www/html/storage/app/public
      - logs:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: quartz-db
    restart: always
    environment:
      - MYSQL_DATABASE=quartz
      - MYSQL_USER=quartz
      - MYSQL_PASSWORD=${DB_PASSWORD:-quartz_secret_2026}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-quartz_root_2026}
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # No ports exposed — only accessible from app container

  redis:
    image: redis:7-alpine
    container_name: quartz-redis
    restart: always
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    # No ports exposed — only accessible from app container

volumes:
  dbdata:
  redisdata:
  storage:
  logs:
