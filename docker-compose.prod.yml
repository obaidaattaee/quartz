# ============================================================================
# Quartz — Production stack
# ----------------------------------------------------------------------------
#   app        PHP-FPM + nginx + baked assets  (port 80)
#   queue      php artisan queue:work          (no port)
#   scheduler  loop schedule:run every 60s     (no port)
#   db         MySQL 8                         (no port)
#   redis      Redis 7                         (no port)
#
# Source is baked into the image — no bind mounts, no host dependencies.
# Usage:
#   docker compose -f docker-compose.prod.yml build
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml exec app php artisan migrate --force
# ============================================================================

x-app-env: &app_env
  APP_NAME: Quartz
  APP_ENV: production
  APP_DEBUG: "false"
  APP_URL: https://${DOMAIN:-localhost}
  APP_KEY: ${APP_KEY}
  APP_LOCALE: en
  APP_FALLBACK_LOCALE: en
  LOG_CHANNEL: stderr
  LOG_LEVEL: warning
  TRUSTED_PROXIES: ${TRUSTED_PROXIES:-*}
  DB_CONNECTION: mysql
  DB_HOST: db
  DB_PORT: 3306
  DB_DATABASE: quartz
  DB_USERNAME: quartz
  DB_PASSWORD: ${DB_PASSWORD}
  CACHE_STORE: redis
  SESSION_DRIVER: redis
  QUEUE_CONNECTION: redis
  REDIS_HOST: redis
  REDIS_PORT: 6379
  MAIL_MAILER: ${MAIL_MAILER:-smtp}
  MAIL_HOST: ${MAIL_HOST:-}
  MAIL_PORT: ${MAIL_PORT:-587}
  MAIL_USERNAME: ${MAIL_USERNAME:-}
  MAIL_PASSWORD: ${MAIL_PASSWORD:-}
  MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@quartz.com}
  MAIL_FROM_NAME: Quartz Solutions

x-app-build: &app_build
  build:
    context: .
    dockerfile: docker/prod/Dockerfile

services:
  app:
    <<: *app_build
    container_name: quartz-app
    restart: always
    ports:
      - "${APP_PORT:-80}:80"
    environment: *app_env
    volumes:
      - storage_public:/var/www/html/storage/app/public
      - storage_logs:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  queue:
    <<: *app_build
    container_name: quartz-queue
    restart: always
    environment: *app_env
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    entrypoint: ["/bin/sh", "-c"]
    volumes:
      - storage_public:/var/www/html/storage/app/public
      - storage_logs:/var/www/html/storage/logs
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    <<: *app_build
    container_name: quartz-scheduler
    restart: always
    environment: *app_env
    command: >
      sh -c "while true; do
        php artisan schedule:run --verbose --no-interaction;
        sleep 60;
      done"
    entrypoint: ["/bin/sh", "-c"]
    volumes:
      - storage_public:/var/www/html/storage/app/public
      - storage_logs:/var/www/html/storage/logs
    depends_on:
      app:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: quartz-db
    restart: always
    environment:
      MYSQL_DATABASE: quartz
      MYSQL_USER: quartz
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: quartz-redis
    restart: always
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  dbdata:
  redisdata:
  storage_public:
  storage_logs:
